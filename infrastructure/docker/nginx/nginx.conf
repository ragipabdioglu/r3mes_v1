# R3MES depolama geçidi — OpenResty (Nginx + Lua).
# Kubo HTTP gateway'e (ipfs:8080) ters vekil; büyük nesneler için slice + proxy_cache (disk);
# Redis: Lua ile istek sayacı / meta (sıcak anahtarlar uygulama katmanında genişletilebilir).
#
# Bağlama: docker-compose.storage.yml içinde gateway servisi bu dosyayı
# /usr/local/openresty/nginx/conf/nginx.conf olarak mount eder.

worker_processes auto;
# Alpine imajda /var/log/nginx yok; stderr konteyner loglarına düşer.
error_log stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Disk üzerinde içerik adresli yanıtların kalıcı önbelleği (büyük parçalar slice ile).
    proxy_cache_path /var/cache/nginx/ipfs levels=1:2 keys_zone=ipfs_cache:256m max_size=20g inactive=30d use_temp_path=off;

    server {
        listen 8080;
        server_name _;

        # Docker embedded DNS — upstream adı başlangıçta çözülemezse emerg olmaması için istek anında çözülür.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # IPFS gateway sınırsız nesne; istemci yükleme bu profilde kapalı olabilir.
        client_max_body_size 32m;

        # Sağlık uçu — dışarıdan http://localhost:8080/health (Kubo'ya gitmez).
        location = /health {
            access_log off;
            default_type text/plain;
            charset utf-8;
            return 200 'healthy\n';
        }

        location / {
            # Redis: Lua ile hafif entegrasyon (istatistik / ileride CID meta anahtarları).
            # Redis kapalıysa istek yine de Kubo'ya gider (pcall).
            access_by_lua_block {
                pcall(function()
                    local redis = require "resty.redis"
                    local red = redis:new()
                    red:set_timeout(80)
                    if red:connect("redis", 6379) then
                        red:incr("r3mes:gateway:requests")
                        red:set_keepalive(20000, 100)
                    end
                end)
            }

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Büyük dosyalar: parça (range) istekleriyle önbellek verimliliği.
            slice 4m;
            proxy_set_header Range $slice_range;

            proxy_cache ipfs_cache;
            proxy_cache_key "$scheme$proxy_host$request_uri$slice_range";
            proxy_cache_valid 200 206 7d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5m;
            proxy_cache_revalidate on;
            add_header X-Cache-Status $upstream_cache_status always;

            # upstream { server ipfs:8080 } yerine değişken + resolver: başlangıçta DNS yokken emerg önlenir.
            set $kubo_peer ipfs:8080;
            proxy_pass http://$kubo_peer$request_uri;
        }
    }
}
