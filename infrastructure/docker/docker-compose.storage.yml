# R3MES — yalnızca depolama / ağ katmanı (Kubo + Redis + Nginx gateway).
# Faz 1'deki diğer compose dosyalarından bağımsız çalıştırın:
#   docker compose -f infrastructure/docker/docker-compose.storage.yml up -d
#
# Yerel doğrulama (host IPFS gateway — C++ llama-server 8080 ile çakışmaması için 9080):
#   curl -fsS http://localhost:9080/health

name: r3mes-storage

services:
  ipfs:
    image: ipfs/kubo:v0.32.1
    container_name: r3mes-ipfs
    restart: unless-stopped
    environment:
      IPFS_PROFILE: server
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/export
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "5001:5001"
    expose:
      - "8080"
    networks:
      - storage
    # Daemon hazır (gateway 8080 genelde birlikte ayağa kalkar).
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 10s
      retries: 25
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: r3mes-redis-cache
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - storage
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: r3mes-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - storage
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    image: openresty/openresty:1.25.3.1-0-alpine
    container_name: r3mes-storage-gateway
    restart: unless-stopped
    depends_on:
      ipfs:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9080:8080"
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - nginx_cache:/var/cache/nginx/ipfs
    networks:
      - storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      # İlk worker + resolver hazır; ipfs/redis healthy sonrası nginx açılışı için pay bırak.
      start_period: 30s

volumes:
  ipfs_data:
  ipfs_staging:
  redis_data:
  qdrant_data:
  nginx_cache:

networks:
  storage:
    name: r3mes-storage-net
