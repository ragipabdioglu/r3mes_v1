[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "r3mes-qa-worker"
version = "0.1.0"
description = "R3MES QA benchmark worker — Redis consumer, IPFS fetch, ROUGE/BLEU, webhook"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "redis>=5.0",
  "httpx>=0.27",
  "rouge-score>=0.1.2",
  "sacrebleu>=2.4",
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.4",
  "fakeredis>=2.23",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["r3mes_qa_worker*"]

[tool.setuptools.package-data]
r3mes_qa_worker = ["data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"
